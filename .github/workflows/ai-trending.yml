name: AI GitHub Trending Daily Post

on:
  schedule:
    # UTC 23:00 = 北京时间 07:00
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-trending-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch GitHub Trending and generate post
        run: python scripts/fetch_github_trending.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: 自动生成 GitHub Trending 每日博文"
          git push
